# ──────────────────────────────────────────────
# Experiment configuration — MLP baseline
# ──────────────────────────────────────────────

experiment:
  name: "mlp-baseline"
  seed: 42

wandb:
  enabled: false
  project: "bdh-searchless-chess"
  tags: ["baseline", "mlp"]

data:
  hf_dataset: "mateuszgrzyb/lichess-stockfish-normalized"
  output_dir: "data/processed"
  num_samples: 50000        # small subset for smoke-test
  train_ratio: 0.80
  val_ratio: 0.10
  test_ratio: 0.10
  cp_scale: 10000.0
  batch_size: 256
  num_workers: 0

model:
  architecture: "mlp"
  hidden_dim: 256
  num_layers: 2
  dropout: 0.1

training:
  epochs: 5
  learning_rate: 0.001
  min_learning_rate: 0.000001
  weight_decay: 0.0001
  clipnorm: 1.0
  mixed_precision: false
  warmup_epochs: 1
  save_every_epochs: 5
  early_stopping:
    patience: 3
    min_delta: 0.00001

evaluation:
  puzzle_path: "data/puzzles/test_puzzles.feather"

output:
  dir: "outputs/mlp-baseline"
