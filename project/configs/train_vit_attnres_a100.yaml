# ──────────────────────────────────────────────
# ViT-S + AttnRes — Windowed Attention Residuals experiment
# Vision Transformer with depth-wise softmax retrieval
# ──────────────────────────────────────────────
# Inspired by "Attention Residuals" (Kimi Team, 2025).
# Uses Windowed AttnRes (W=3): each sublayer receives a
# softmax-weighted mixture of the last W sublayer outputs,
# using a learned pseudo-query and RMSNorm on depth keys.
# Sources outside the window are detached from autograd.
#
# Additional improvements over base ViT-S v2:
#   - SwiGLU FFN (replaces GELU, better parameter efficiency)
#   - RMSNorm (replaces LayerNorm, lighter)
#   - Per-sublayer depth mixing with W=3 window
#
# GPU: NVIDIA A100 (40/80 GB VRAM)

experiment:
  name: "vit-s-attnres"
  seed: 42

wandb:
  enabled: true
  project: "bdh-searchless-chess"
  tags: ["vit", "attnres", "a100", "50M", "score-fix", "depth-mixing", "swiglu"]

data:
  hf_dataset: "mateuszgrzyb/lichess-stockfish-normalized"
  output_dir: "/net/tscratch/people/plgantoniczapski/bdh-chess-data-v2"
  num_samples: 50000000       # 50M positions
  train_ratio: 0.90
  val_ratio: 0.05
  test_ratio: 0.05
  cp_scale: 1000.0            # Reference uses tanh(cp/1000)
  batch_size: 4096             # Window AttnRes (W=3) still needs more VRAM than base ViT
  num_workers: 8               # Match SLURM --cpus-per-task=8

model:
  architecture: "vit_attnres"
  projection_dim: 256          # Same dim as ViT-S v2
  num_heads: 4                 # Same heads as ViT-S v2
  transformer_layers: 5        # Same depth — 10 sublayers, 11 depth sources
  ffn_ratio: 2                 # SwiGLU with 2/3 adjustment → ~same param count
  dropout_rate: 0.1

training:
  epochs: 40                   # 36h budget allows ~36+ epochs at ~34 min/epoch
  learning_rate: 0.0002        # Same as ViT-S v2
  min_learning_rate: 0.000001  # 1e-6
  weight_decay: 0.0001         # 1e-4
  clipnorm: 1.0
  mixed_precision: true
  amp_dtype: bf16
  warmup_epochs: 5
  save_every_epochs: 2
  compile:
    enabled: false
    mode: "default"
  early_stopping:
    patience: 12
    min_delta: 0.00001

output:
  dir: "/net/tscratch/people/plgantoniczapski/bdh-chess-outputs/vit-s-attnres"

evaluation:
  puzzle_path: "data/puzzles/test_puzzles.feather"
