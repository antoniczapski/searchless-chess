# ──────────────────────────────────────────────
# BDH-Chess v3 — Large-scale training on A100
# Iterative value refinement with synaptic scratchpad
# ──────────────────────────────────────────────
# GPU: NVIDIA A100 (40/80 GB VRAM)

experiment:
  name: "bdh-chess-v3-a100"
  seed: 42

wandb:
  enabled: false
  project: "bdh-searchless-chess"
  tags: ["bdh", "iterative", "a100", "large-scale"]

data:
  hf_dataset: "mateuszgrzyb/lichess-stockfish-normalized"
  output_dir: "/net/tscratch/people/plgantoniczapski/bdh-chess-data"
  num_samples: 50000000       # 50M positions
  train_ratio: 0.90
  val_ratio: 0.05
  test_ratio: 0.05
  cp_scale: 10000.0
  batch_size: 1024
  num_workers: 4

model:
  architecture: "bdh"
  n_embd: 256
  n_head: 8
  n_neurons_mult: 8           # N = 8*256/8 = 256 per head, 2048 total
  thinking_steps: 12           # more refinement steps
  dropout: 0.1
  init_damping: 0.9
  deep_supervision: true
  deep_sup_weight: 0.1
  stability_weight: 0.01

training:
  epochs: 30
  learning_rate: 0.0005
  min_learning_rate: 0.000001
  weight_decay: 0.0001
  clipnorm: 1.0
  mixed_precision: true
  warmup_epochs: 3
  save_every_epochs: 3
  early_stopping:
    patience: 10
    min_delta: 0.00001

evaluation:
  puzzle_path: "data/puzzles/test_puzzles.feather"

output:
  dir: "/net/tscratch/people/plgantoniczapski/bdh-chess-outputs/bdh-chess-v3-a100"
