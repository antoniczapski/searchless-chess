# ──────────────────────────────────────────────
# Smoke test config — ViT (tiny, CPU, synthetic data)
# ──────────────────────────────────────────────
# Used for CI and local validation. Runs on CPU
# with synthetic data via --smoke-test flag.

experiment:
  name: "vit-smoke"
  seed: 42

wandb:
  enabled: false

data:
  hf_dataset: "mateuszgrzyb/lichess-stockfish-normalized"
  output_dir: "data/processed"
  num_samples: 1000
  train_ratio: 0.80
  val_ratio: 0.10
  test_ratio: 0.10
  cp_scale: 1000.0
  batch_size: 16
  num_workers: 0

model:
  architecture: "vit"
  projection_dim: 32
  num_heads: 2
  transformer_layers: 1
  ffn_ratio: 2
  dropout_rate: 0.0

training:
  epochs: 2
  learning_rate: 0.001
  min_learning_rate: 0.0001
  weight_decay: 0.0001
  clipnorm: 1.0
  mixed_precision: false
  warmup_epochs: 0
  save_every_epochs: 1
  early_stopping:
    patience: 5
    min_delta: 0.0

output:
  dir: "outputs/smoke"

evaluation:
  puzzle_path: "data/puzzles/test_puzzles.feather"
