name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install UV
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync --all-extras

      - name: Lint (ruff)
        run: |
          uv run ruff check src/ tests/ scripts/ --exit-zero

      - name: Compile check
        run: |
          uv run python -m compileall src/ scripts/ -q

      - name: Run tests
        run: |
          uv run pytest -q --tb=short
